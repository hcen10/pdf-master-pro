name: pdf_master_pro
description: PDF Master Pro - The Ultimate PDF Toolkit
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF processing
  pdf: ^3.10.8
  printing: ^5.12.0

  # File picking & sharing
  file_picker: ^8.0.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # UI & State
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
